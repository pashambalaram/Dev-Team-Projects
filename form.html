<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1> Create Form page</h1>
    <form style="width: 500px;">
        <fieldset>
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Enter the name"><br><br>

              <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter the email"><br><br>
            
              <label for="number">Mobile Number:</label>
            <input type="number" name="number" id="number" placeholder="Enter the number"><Br><br>
                <button type="submit">Submit</button>
            
             
        </fieldset>
    </form>
    
</body>
</html>
